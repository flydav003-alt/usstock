name: Grok Elite Swing

on:
  schedule:
- cron: '0 5 * * 2-6'
  workflow_dispatch:

jobs:
  run-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy requests plotly lxml beautifulsoup4

      - name: Run scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENTS:   ${{ secrets.EMAIL_RECIPIENTS }}
          PAGES_URL:          ${{ secrets.PAGES_URL }}
        run: python grok_elite_swing.py

      - name: Update GitHub Pages
        run: |
          HTML_FILE=$(ls Grok_Elite_Swing_Report_*.html 2>/dev/null | head -1)
          if [ -n "$HTML_FILE" ]; then
            mkdir -p docs
            cp "$HTML_FILE" docs/index.html
          fi

      - name: Update Web and Clean History
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. 處理網頁檔案：確保 docs 存在，並將今日報表轉為 index.html
          mkdir -p docs
          HTML_FILE=$(ls Grok_Elite_Swing_Report_*.html 2>/dev/null | head -1)
          if [ -n "$HTML_FILE" ]; then
            cp "$HTML_FILE" docs/index.html
          fi
          
          # 2. 徹底清理：從 GitHub 紀錄中移除所有具備日期檔名的 CSV 和 HTML
          # 使用 git rm 會同步刪除實體檔案並標記為「不再追蹤」
          git rm Grok_Elite_Swing_*.csv || true
          git rm Grok_Elite_Swing_Report_*.html || true
          
          # 3. 唯獨加回 index.html，確保網頁佈告欄有東西顯示
          git add docs/index.html
          
          # 4. 提交與推送
          git diff --staged --quiet || git commit -m "Update Daily Report & Auto Clean"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
